<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказчик - Мои заявки</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Личный кабинет заказчика</h1>
            <div class="user-info">
                <span id="userName"></span>
                <button onclick="logout()">Выйти</button>
            </div>
        </div>

        <div class="nav">
            <button onclick="showSection('newRequest')" class="active">Новая заявка</button>
            <button onclick="showSection('myRequests')">Мои заявки</button>
            <button onclick="showSection('editProfile')">Профиль</button>
        </div>

        <!-- Новая заявка -->
        <div id="newRequest" class="section active">
            <h2>Подача заявки на ремонт</h2>
            <form id="requestForm">
                <input type="text" id="carType" placeholder="Тип автомобиля" required>
                <input type="text" id="carModel" placeholder="Модель" required>
                <textarea id="problemDescription" placeholder="Описание проблемы" required></textarea>
                <button type="submit">Отправить заявку</button>
            </form>
            <div id="requestResult"></div>
        </div>

        <!-- Мои заявки -->
        <div id="myRequests" class="section">
            <h2>Мои заявки</h2>
            <div id="requestsList"></div>
        </div>

        <!-- Редактирование профиля -->
        <div id="editProfile" class="section">
            <h2>Редактирование профиля</h2>
            <form id="profileForm">
                <input type="text" id="fio" placeholder="ФИО" required>
                <input type="text" id="phone" placeholder="Телефон" required>
                <button type="submit">Сохранить</button>
            </form>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/tourist.js"></script>
</body>
</html>
