<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автомеханик - Панель управления</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Стили для модального окна */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 10px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #666;
        }

            .close:hover {
                color: #1a73e8;
            }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            flex: 1;
        }

            .tab-btn.active {
                color: #1a73e8;
                border-bottom: 2px solid #1a73e8;
                font-weight: bold;
            }

        .detail-tab {
            padding: 15px 0;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }

        .status-progress {
            background: #2196F3;
        }

        .status-ready {
            background: #4CAF50;
        }

        .status-new {
            background: #ff9800;
        }

        .status-waiting {
            background: #9C27B0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Панель автомеханика</h1>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <span id="userRole"></span>
                <button onclick="logout()">Выйти</button>
            </div>
        </div>

        <div style="margin-bottom: 10px; padding: 10px; background: #e8f0fe; border-radius: 5px;" id="debugInfo">
            Загрузка данных...
        </div>

        <div class="nav">
            <button class="active" onclick="showTab('myRequests')">Мои заявки</button>
            <button onclick="showTab('availableRequests')">Доступные заявки</button>
        </div>

        <div id="myRequestsTab" class="tab active">
            <h2>Мои заявки</h2>
            <div id="myRequestsList">Загрузка...</div>
        </div>

        <div id="availableRequestsTab" class="tab">
            <h2>Доступные заявки</h2>
            <div id="availableRequestsList">Загрузка...</div>
        </div>
    </div>

    <!-- ========== МОДАЛЬНОЕ ОКНО (ДОБАВЬ ЭТО) ========== -->
    <div id="requestDetailModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('requestDetailModal')">&times;</span>
            <h2 id="detailRequestTitle">Заявка №</h2>

            <div id="detailRequestInfo" style="margin-bottom: 20px; padding: 10px; background: #f5f5f5; border-radius: 5px;"></div>

            <!-- Кнопки вкладок -->
            <div style="display: flex; border-bottom: 2px solid #1a73e8; margin-bottom: 15px;">
                <button class="tab-btn active" onclick="showDetailTab('info')">📋 Информация</button>
                <button class="tab-btn" onclick="showDetailTab('comments')">💬 Комментарии</button>
                <button class="tab-btn" onclick="showDetailTab('parts')">🔧 Запчасти</button>
            </div>

            <!-- Вкладка Информация -->
            <div id="detailInfoTab" class="detail-tab">
                <h3>Управление статусом</h3>
                <select id="detailStatus" style="width: 100%; padding: 8px; margin-bottom: 10px;">
                    <option value="В процессе ремонта">🔧 В процессе ремонта</option>
                    <option value="Ожидание автозапчастей">⏳ Ожидание запчастей</option>
                    <option value="Готова к выдаче">✅ Готова к выдаче</option>
                </select>
                <button onclick="updateStatusFromDetail()" style="width: 100%;">Обновить статус</button>
            </div>

            <!-- Вкладка Комментарии -->
            <div id="detailCommentsTab" class="detail-tab" style="display: none;">
                <h3>Комментарии к заявке</h3>
                <div id="commentsList" style="max-height: 200px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px;"></div>

                <textarea id="newComment" placeholder="Ваш комментарий..." rows="3" style="width: 100%; margin-bottom: 10px;"></textarea>
                <button onclick="addComment()" style="width: 100%; margin-bottom: 5px;">💬 Добавить комментарий</button>
                <button onclick="requestHelp()" style="width: 100%; background: #ff9800;">🆘 Запросить помощь менеджера</button>
            </div>

            <!-- Вкладка Запчасти -->
            <div id="detailPartsTab" class="detail-tab" style="display: none;">
                <h3>Заказанные запчасти</h3>
                <div id="partsList" style="max-height: 200px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px;"></div>

                <h4>Добавить запчасть</h4>
                <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                    <input type="text" id="partName" placeholder="Наименование" style="flex: 2; padding: 8px;">
                    <input type="text" id="partNumber" placeholder="Артикул" style="flex: 1; padding: 8px;">
                    <input type="number" id="partQuantity" placeholder="Кол-во" value="1" min="1" style="width: 80px; padding: 8px;">
                </div>
                <button onclick="addPart()" style="width: 100%; margin-top: 10px;">➕ Добавить запчасть</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/mechanic.js"></script>
</body>
</html>
