<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автомеханик - Мои заявки</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Панель автомеханика</h1>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <span id="userRole"></span>
                <button onclick="logout()">Выйти</button>
            </div>
        </div>

        <div style="margin-bottom: 10px; padding: 10px; background: #e8f0fe; border-radius: 5px;" id="debugInfo">
            Загрузка данных...
        </div>

        <div class="nav">
            <button class="active" onclick="showTab('myRequests')">Мои заявки</button>
            <button onclick="showTab('availableRequests')">Доступные заявки</button>
        </div>

        <div id="myRequestsTab" class="tab active">
            <h2>Мои заявки</h2>
            <div id="myRequestsList">Загрузка...</div>
        </div>

        <div id="availableRequestsTab" class="tab">
            <h2>Доступные заявки</h2>
            <div id="availableRequestsList">Загрузка...</div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        let currentUser = null;
        let allRequests = [];
        let allUsers = [];

        document.addEventListener('DOMContentLoaded', async function () {
            currentUser = app.getUser();
            if (!currentUser) {
                window.location.href = 'authorization.html';
                return;
            }

            // Проверяем роль (должен быть Автомеханик)
            if (currentUser.type !== 'Автомеханик') {
                alert(`Доступ запрещен. Ваша роль: ${currentUser.type}`);
                window.location.href = 'authorization.html';
                return;
            }

            document.getElementById('userName').textContent = currentUser.fio;
            document.getElementById('userRole').textContent = currentUser.type;

            await loadUsers();
            await loadMyRequests();
        });

        async function loadUsers() {
            try {
                allUsers = await apiGet('/Users');
                console.log('Загружено пользователей:', allUsers);
            } catch (error) {
                console.error('Ошибка загрузки пользователей:', error);
            }
        }

        function getUserName(userId) {
            if (!userId) return 'Не назначен';
            const user = allUsers.find(u => u.userID === userId);
            return user ? user.fio : `ID: ${userId}`;
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));

            document.getElementById(tabName + 'Tab').classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'myRequests') loadMyRequests();
            if (tabName === 'availableRequests') loadAvailableRequests();
        }

        async function loadMyRequests() {
            document.getElementById('debugInfo').innerHTML = 'Загрузка моих заявок...';

            try {
                allRequests = await apiGet('/Requests');
                console.log('Текущий пользователь ID:', currentUser.userID);
                console.log('Все заявки:', allRequests);

                // ВАЖНО: В JSON поле называется masterID (с большой D), а не masterId
                const myRequests = allRequests.filter(r => r.masterID === currentUser.userID);

                document.getElementById('debugInfo').innerHTML = `✅ Найдено моих заявок: ${myRequests.length}`;
                displayRequests(myRequests, 'myRequestsList', true);
            } catch (error) {
                document.getElementById('debugInfo').innerHTML = `❌ Ошибка: ${error.message}`;
            }
        }

        async function loadAvailableRequests() {
            document.getElementById('debugInfo').innerHTML = 'Загрузка доступных заявок...';

            try {
                allRequests = await apiGet('/Requests');
                // ВАЖНО: masterID (с большой D) и статус 'Новая заявка'
                const available = allRequests.filter(r => !r.masterID && r.requestStatus === 'Новая заявка');

                document.getElementById('debugInfo').innerHTML = `✅ Доступно заявок: ${available.length}`;
                displayRequests(available, 'availableRequestsList', false);
            } catch (error) {
                document.getElementById('debugInfo').innerHTML = `❌ Ошибка: ${error.message}`;
            }
        }

        function displayRequests(requests, elementId, showActions) {
            const container = document.getElementById(elementId);

            if (!requests || requests.length === 0) {
                container.innerHTML = '<p>Заявок не найдено</p>';
                return;
            }

            container.innerHTML = requests.map(r => {
                let statusClass = '';
                if (r.requestStatus === 'В процессе ремонта') statusClass = 'status-progress';
                else if (r.requestStatus === 'Готова к выдаче') statusClass = 'status-ready';
                else if (r.requestStatus === 'Новая заявка') statusClass = 'status-new';

                return `
                        <div class="request-card">
                            <h3>Заявка №${r.requestID}</h3>
                            <p><strong>Клиент:</strong> ${getUserName(r.clientID)}</p>
                            <p><strong>Автомобиль:</strong> ${r.carType || ''} ${r.carModel || ''}</p>
                            <p><strong>Проблема:</strong> ${r.problemDescription || ''}</p>
                            <p><strong>Статус:</strong> <span class="status-badge ${statusClass}">${r.requestStatus}</span></p>
                            <p><strong>Дата:</strong> ${r.startDate ? new Date(r.startDate).toLocaleDateString() : '-'}</p>

                            ${showActions ? `
                                <select id="status-${r.requestID}" class="status-select">
                                    <option value="В процессе ремонта" ${r.requestStatus === 'В процессе ремонта' ? 'selected' : ''}>В работе</option>
                                    <option value="Готова к выдаче" ${r.requestStatus === 'Готова к выдаче' ? 'selected' : ''}>Готова к выдаче</option>
                                </select>
                                <button onclick="updateStatus(${r.requestID})">Обновить статус</button>
                            ` : ''}

                            ${!showActions && r.requestStatus === 'Новая заявка' ? `
                                <button onclick="takeRequest(${r.requestID})">Взять в работу</button>
                            ` : ''}
                        </div>
                    `;
            }).join('');
        }

        async function takeRequest(requestId) {
            try {
                await apiPost(`/Requests/${requestId}`, {
                    masterId: currentUser.userID,
                    status: 'В процессе ремонта'
                });

                alert('✅ Заявка принята');
                await loadMyRequests();
                await loadAvailableRequests();
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }

        async function updateStatus(requestId) {
            const status = document.getElementById(`status-${requestId}`).value;

            try {
                await apiPost(`/Requests/${requestId}`, {
                    status: status
                });

                alert('✅ Статус обновлен');
                await loadMyRequests();
                await loadAvailableRequests();
            } catch (error) {
                alert('❌ Ошибка: ' + error.message);
            }
        }

        function logout() {
            app.logout();
        }
    </script>
</body>
</html>
