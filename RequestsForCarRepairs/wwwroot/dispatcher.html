<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оператор - Управление заявками</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Панель оператора</h1>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <span id="userRole"></span>
                <button onclick="logout()">Выйти</button>
            </div>
        </div>

        
        <div style="margin-bottom: 10px; padding: 10px; background: #e8f0fe; border-radius: 5px;" id="debugInfo">
            Загрузка данных...
        </div>

        
        <div class="statistics-panel">
            <div class="stat-card">
                <h3>Всего заявок</h3>
                <div class="value" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <h3>В работе</h3>
                <div class="value" id="inProgressCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Завершено</h3>
                <div class="value" id="completedCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Среднее время</h3>
                <div class="value" id="avgTime">0 дн.</div>
            </div>
        </div>

        <div class="filter-panel">
            <input type="text" id="searchInput" placeholder="Поиск по номеру, клиенту, авто...">
            <select id="statusFilter">
                <option value="">Все статусы</option>
                <option value="Новая заявка">Новая</option>
                <option value="В процессе ремонта">В процессе</option>
                <option value="Ожидание автозапчастей">Ожидание</option>
                <option value="Готова к выдаче">Готова</option>
                <option value="Завершена">Завершена</option>
            </select>
            <button onclick="searchRequests()">🔍 Поиск</button>
            <button onclick="resetFilters()">🔄 Сброс</button>
            <button onclick="openCreateModal()" style="background: #4CAF50;">+ Новая заявка</button>
        </div>


        <div class="nav">
            <button class="active" onclick="showTab('allRequests')">Все заявки</button>
            <button onclick="showTab('statistics')">Статистика</button>
        </div>

        <div id="allRequestsTab" class="tab active">
            <table class="request-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Дата</th>
                        <th>Клиент</th>
                        <th>Авто</th>
                        <th>Проблема</th>
                        <th>Статус</th>
                        <th>Механик</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="requestsTableBody">
                    <tr><td colspan="8">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>

        
        <div id="statisticsTab" class="tab">
            <h2>Статистика по типам неисправностей</h2>
            <table class="request-table">
                <thead>
                    <tr>
                        <th>Тип неисправности</th>
                        <th>Количество</th>
                        <th>Процент</th>
                    </tr>
                </thead>
                <tbody id="problemStatsTable">
                    <tr><td colspan="3">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

   
    <div id="requestModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('requestModal')">&times;</span>
            <h2 id="modalTitle">Новая заявка</h2>
            <form id="requestForm" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label>Вид авто:</label>
                    <input type="text" id="carType" required>
                </div>
                <div class="form-group">
                    <label>Модель авто:</label>
                    <input type="text" id="carModel" required>
                </div>
                <div class="form-group">
                    <label>Описание проблемы:</label>
                    <textarea id="problemDescription" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>ФИО клиента:</label>
                    <input type="text" id="clientFio" required>
                </div>
                <div class="form-group">
                    <label>Номер телефона:</label>
                    <input type="text" id="clientPhone" required>
                </div>
                <div class="form-group">
                    <label>Назначить механика:</label>
                    <select id="assignMechanic">
                        <option value="">Не назначать</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Статус:</label>
                    <select id="requestStatus">
                        <option value="Новая заявка">Новая</option>
                        <option value="В процессе ремонта">В процессе</option>
                        <option value="Ожидание автозапчастей">Ожидание</option>
                        <option value="Готова к выдаче">Готова</option>
                        <option value="Завершена">Завершена</option>
                    </select>
                </div>
                <button type="button" onclick="saveRequest()">Сохранить</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/dispatcher.js"></script>
</body>
</html>
